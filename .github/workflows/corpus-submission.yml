name: Corpus Submission

on:
  pull_request:
    paths:
      - "**/*.wasm"
  push:
    paths:
      - "**/*.wasm"

jobs:
  validate-and-execute:
    runs-on: ubuntu-latest
    env:
      BINARYEN_VERSION: version_125

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Binaryen
        run: |
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/binaryen-${BINARYEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Find added WASM files
        id: added-wasm
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ "$base" =~ ^0+$ ]]; then
            git diff-tree --root --name-only --diff-filter=A "$head" -- "*.wasm" > added-wasm.txt
          else
            git diff --name-only --diff-filter=A "$base" "$head" -- "*.wasm" > added-wasm.txt
          fi

          if [[ -s added-wasm.txt ]]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            cat added-wasm.txt
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No newly added .wasm files."
          fi

      - name: Validate added WASM files
        if: steps.added-wasm.outputs.has_files == 'true'
        shell: bash
        run: |
          mapfile -t files < added-wasm.txt
          ./scripts/validate "${files[@]}"

      - name: Execute added WASM smoke tests
        if: steps.added-wasm.outputs.has_files == 'true'
        shell: bash
        run: |
          mapfile -t files < added-wasm.txt
          ./scripts/execute "${files[@]}"
