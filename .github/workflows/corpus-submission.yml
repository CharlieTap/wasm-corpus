name: Corpus Submission

on:
  pull_request:
    paths:
      - "**/*.wasm"
      - "1.0/*.json"
      - "2.0/*.json"
      - "3.0/*.json"
      - "schema/*.json"
      - "scripts/**"
  push:
    paths:
      - "**/*.wasm"
      - "1.0/*.json"
      - "2.0/*.json"
      - "3.0/*.json"
      - "schema/*.json"
      - "scripts/**"

jobs:
  validate-and-execute:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Binaryen and wasm-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binaryen
          cargo install wasm-tools --version 1.239.0 --locked

      - name: Find WASM files to validate
        id: wasm-files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ "$base" =~ ^0+$ ]]; then
            git diff-tree --root --name-only --diff-filter=AM "$head" > changed-files.txt
          else
            git diff --name-only --diff-filter=AM "$base" "$head" > changed-files.txt
          fi

          validate_all=false
          : > wasm-files.unsorted

          while IFS= read -r file; do
            case "$file" in
              scripts/*|schema/*)
                validate_all=true
                ;;
              *.wasm)
                printf '%s\n' "$file" >> wasm-files.unsorted
                ;;
              [123].0/*.json)
                wasm="${file%.json}.wasm"
                if [[ -f "$wasm" ]]; then
                  printf '%s\n' "$wasm" >> wasm-files.unsorted
                fi
                ;;
            esac
          done < changed-files.txt

          if [[ "$validate_all" == "true" ]]; then
            find 1.0 2.0 3.0 -maxdepth 1 -name '*.wasm' | sort > wasm-files.txt
          else
            sort -u wasm-files.unsorted > wasm-files.txt
          fi

          if [[ -s wasm-files.txt ]]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            cat wasm-files.txt
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "No WASM files need validation."
          fi

      - name: Validate WASM files
        if: steps.wasm-files.outputs.has_files == 'true'
        shell: bash
        run: |
          mapfile -t files < wasm-files.txt
          ./scripts/validate "${files[@]}"

      - name: Execute WASM smoke tests
        if: steps.wasm-files.outputs.has_files == 'true'
        shell: bash
        run: |
          mapfile -t files < wasm-files.txt
          ./scripts/execute "${files[@]}"
